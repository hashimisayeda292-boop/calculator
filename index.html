<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mode Graphing Calculator - Split Screen</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #0a0a0a;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* Splash Screen */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        .splash-logo {
            width: 150px;
            height: auto;
            fill: #ffffff;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }

        .fade-out {
            opacity: 0;
            visibility: hidden;
        }

        /* Desmos Side-by-Side Split Container */
        .calculator-container {
            display: flex;
            flex-direction: row; /* Puts controls on left, graph on right */
            background-color: #141414;
            border-radius: 15px;
            box-shadow: 0px 10px 40px rgba(0, 0, 0, 0.7);
            border: 1px solid #2d2d2d;
            width: 95vw;
            max-width: 900px;
            height: 500px;
            overflow: hidden;
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .container-visible {
            opacity: 1;
            transform: scale(1);
        }

        /* Left Side Control Panel (Typing & Buttons) */
        .control-panel {
            width: 40%;
            min-width: 320px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2d2d2d;
            box-sizing: border-box;
        }

        /* Right Side Graph Viewport */
        .graph-panel {
            width: 60%;
            height: 100%;
            position: relative;
        }

        #graphCanvas {
            background-color: #000000;
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Display Wrapper */
        .display-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 15px;
        }

        #display {
            width: 100%;
            height: 60px;
            background-color: #111;
            border: 1px solid #444;
            color: #ffffff; 
            text-align: right;
            font-size: 24px;
            padding: 5px 15px;
            box-sizing: border-box;
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            position: relative;
            z-index: 2;
        }

        /* Watermark Logo */
        .nike-logo-overlay {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .nike-logo-overlay svg {
            fill: rgba(255, 255, 255, 0.25);
            width: 65px;
            height: auto;
        }

        .hidden {
            opacity: 0 !important;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            flex-grow: 1;
        }

        button {
            padding: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #262626;
            color: white;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: #3a3a3a;
        }

        button:active {
            transform: scale(0.95);
        }

        button.graph-btn {
            background-color: #333;
            border: 1px solid #555;
        }
        button.graph-btn:hover {
            background-color: #444;
        }

        button.operator {
            background-color: #ffffff;
            color: black;
        }
        button.operator:hover {
            background-color: #dddddd;
        }

        button.clear {
            background-color: #b32424;
        }
        button.clear:hover {
            background-color: #d93636;
        }
    </style>
</head>
<body>

<!-- Splash Loader Screen -->
<div id="splash-screen">
    <svg class="splash-logo" viewBox="0 0 24 24">
        <path d="M21,6.5c-0.3,0.3-4.1,3.4-8.8,5.9C7.4,14.9,3.1,16,1.9,15.6c-0.2,0-0.3-0.2-0.1-0.4c0.5-0.6,3.6-4.1,8.9-7.3 c4.4-2.7,8.8-4,10.1-3.6C21.1,4.5,21.3,6.2,21,6.5z"/>
    </svg>
</div>

<!-- Desmos Styled Horizon Split App Box -->
<div class="calculator-container" id="mainContainer">
    
    <!-- LEFT SIDE: Typing Inputs and Number Layout Pad -->
    <div class="control-panel">
        <div class="display-wrapper">
            <div class="nike-logo-overlay" id="nikeLogo">
                <svg viewBox="0 0 24 24">
                    <path d="M21,6.5c-0.3,0.3-4.1,3.4-8.8,5.9C7.4,14.9,3.1,16,1.9,15.6c-0.2,0-0.3-0.2-0.1-0.4c0.5-0.6,3.6-4.1,8.9-7.3 c4.4-2.7,8.8-4,10.1-3.6C21.1,4.5,21.3,6.2,21,6.5z"/>
                </svg>
            </div>
            <input type="text" id="display" placeholder="" oninput="checkLogo()">
        </div>
        
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="graph-btn" onclick="appendValue('x')">x</button>
            <button class="graph-btn" onclick="plotGraph()">PLOT</button>
            <button class="operator" onclick="appendValue('/')">/</button>
            
            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button class="operator" onclick="appendValue('*')">*</button>
            
            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button class="operator" onclick="appendValue('-')">-</button>
            
            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button class="operator" onclick="appendValue('+')">+</button>
            
            <button onclick="appendValue('0')" style="grid-column: span 2;">0</button>
            <button onclick="appendValue('.')">.</button>
            <button class="operator" onclick="calculate()">=</button>
        </div>
    </div>

    <!-- RIGHT SIDE: The Graphing Board Viewport -->
    <div class="graph-panel">
        <canvas id="graphCanvas"></canvas>
    </div>

</div>

<script>
    const display = document.getElementById('display');
    const nikeLogo = document.getElementById('nikeLogo');
    const canvas = document.getElementById('graphCanvas');
    const ctx = canvas.getContext('2d');
    const splashScreen = document.getElementById('splash-screen');
    const mainContainer = document.getElementById('mainContainer');

    window.onload = () => {
        resizeCanvas();
        
        setTimeout(() => {
            splashScreen.classList.add('fade-out');
            mainContainer.classList.add('container-visible');
            // Re-call canvas sizing once visible to ensure layout fits perfectly
            resizeCanvas();
            display.focus();
        }, 3000);
    };

    function resizeCanvas() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
        drawGrid();
    }

    function drawGrid() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const scale = 25; 
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;

        ctx.strokeStyle = '#1a1a1a'; 
        ctx.lineWidth = 1;

        for (let x = centerX; x < canvas.width; x += scale) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }
        for (let x = centerX; x > 0; x -= scale) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }
        for (let y = centerY; y < canvas.height; y += scale) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }
        for (let y = centerY; y > 0; y -= scale) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }

        ctx.strokeStyle = '#444'; 
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, centerY); ctx.lineTo(canvas.width, centerY); 
        ctx.moveTo(centerX, 0); ctx.lineTo(centerX, canvas.height); 
        ctx.stroke();
    }

    function checkLogo() {
        if (display.value.length > 0) {
            nikeLogo.classList.add('hidden');
        } else {
            nikeLogo.classList.remove('hidden');
        }
    }

    function appendValue(val) {
        display.value += val;
        checkLogo();
    }

    function clearDisplay() {
        display.value = '';
        checkLogo();
        drawGrid();
    }

    function calculate() {
        try {
            if (!display.value.includes('x')) {
                display.value = eval(display.value);
            } else {
                plotGraph();
            }
            checkLogo();
        } catch (error) {
            display.value = 'Error';
        }
    }

    function plotGraph() {
        drawGrid();
        const expr = display.value;
        if (!expr) return;

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const scale = 25; 

        ctx.strokeStyle = '#00ff66'; /* Glowing green path line */
        ctx.lineWidth = 3;
        ctx.beginPath();

        let first = true;

        for (let pixelX = 0; pixelX < canvas.width; pixelX++) {
            let x = (pixelX - centerX) / scale;
            try {
                let parsedExpr = expr.replace(/(\d)(x)/g, '$1*$2').replace(/x/g, `(${x})`);
                let y = eval(parsedExpr);
                let pixelY = centerY - (y * scale);

                if (first) {
                    ctx.moveTo(pixelX, pixelY);
                    first = false;
                } else {
                    ctx.lineTo(pixelX, pixelY);
                }
            } catch (e) {}
        }
        ctx.stroke();
    }

    // Handle resizing if window changes
    window.addEventListener('resize', resizeCanvas);
</script>

</body>
</html>
