<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mode Graphing Calculator</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #0a0a0a;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .calculator-container {
            background-color: #141414;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 10px 40px rgba(0, 0, 0, 0.7);
            border: 1px solid #2d2d2d;
            width: 100%;
            max-width: 450px;
        }

        /* The Graphing Grid Area */
        #graphCanvas {
            background-color: #000000;
            border: 1px solid #333;
            border-radius: 10px;
            display: block;
            width: 100%;
            height: 250px;
            margin-bottom: 15px;
        }

        #display {
            width: 100%;
            height: 50px;
            background-color: #222;
            border: 1px solid #444;
            color: #00ff66; /* Neon Green text */
            text-align: right;
            font-size: 24px;
            padding: 5px 15px;
            box-sizing: border-box;
            border-radius: 8px;
            margin-bottom: 15px;
            font-family: 'Courier New', Courier, monospace;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #262626;
            color: white;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: #3a3a3a;
        }

        button:active {
            transform: scale(0.95);
        }

        /* Graph & Special Buttons */
        button.graph-btn {
            background-color: #005bb5;
        }
        button.graph-btn:hover {
            background-color: #0073e6;
        }

        button.operator {
            background-color: #ff9500;
            color: black;
        }
        button.operator:hover {
            background-color: #ffaa33;
        }

        button.clear {
            background-color: #b32424;
        }
        button.clear:hover {
            background-color: #d93636;
        }
    </style>
</head>
<body>

<div class="calculator-container">
    <!-- Graph Canvas Screen like Desmos -->
    <canvas id="graphCanvas"></canvas>
    
    <input type="text" id="display" placeholder="Type math or use 'x'" autofocus>
    
    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="graph-btn" onclick="appendValue('x')">x</button>
        <button class="graph-btn" onclick="plotGraph()">PLOT</button>
        <button class="operator" onclick="appendValue('/')">/</button>
        
        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('*')">*</button>
        
        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button class="operator" onclick="appendValue('-')">-</button>
        
        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button class="operator" onclick="appendValue('+')">+</button>
        
        <button onclick="appendValue('0')" style="grid-column: span 2;">0</button>
        <button onclick="appendValue('.')">.</button>
        <button class="operator" onclick="calculate()">=</button>
    </div>
</div>

<script>
    const display = document.getElementById('display');
    const canvas = document.getElementById('graphCanvas');
    const ctx = canvas.getContext('2d');

    // Adjust canvas size internally
    function resizeCanvas() {
        canvas.width = canvas.clientWidth;
        canvas.height = canvas.clientHeight;
        drawGrid();
    }

    // Draw the Desmos-style grid lines on a black background
    function drawGrid() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const scale = 20; // Size of grid squares
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;

        ctx.strokeStyle = '#1a1a1a'; // Very subtle dark grid lines
        ctx.lineWidth = 1;

        // Vertical lines
        for (let x = centerX; x < canvas.width; x += scale) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }
        for (let x = centerX; x > 0; x -= scale) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }

        // Horizontal lines
        for (let y = centerY; y < canvas.height; y += scale) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }
        for (let y = centerY; y > 0; y -= scale) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }

        // Main X and Y Center Axes (thicker lines)
        ctx.strokeStyle = '#555'; 
        ctx.lineWidth = 2;
        
        ctx.beginPath();
        ctx.moveTo(0, centerY); ctx.lineTo(canvas.width, centerY); // X Axis
        ctx.moveTo(centerX, 0); ctx.lineTo(centerX, canvas.height); // Y Axis
        ctx.stroke();
    }

    function appendValue(val) {
        display.value += val;
    }

    function clearDisplay() {
        display.value = '';
        drawGrid();
    }

    function calculate() {
        try {
            // If it's standard math, calculate it
            if (!display.value.includes('x')) {
                display.value = eval(display.value);
            } else {
                plotGraph();
            }
        } catch (error) {
            display.value = 'Error';
        }
    }

    // Graph plotting logic
    function plotGraph() {
        drawGrid();
        const expr = display.value;
        if (!expr) return;

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const scale = 20; // Zoom level

        ctx.strokeStyle = '#00ff66'; // Glowing green line for the plotted function
        ctx.lineWidth = 3;
        ctx.beginPath();

        let first = true;

        for (let pixelX = 0; pixelX < canvas.width; pixelX++) {
            // Convert canvas pixel position to math graph X value
            let x = (pixelX - centerX) / scale;
            
            try {
                // Safely parse expressions like 2x as 2*x
                let parsedExpr = expr.replace(/(\d)(x)/g, '$1*$2').replace(/x/g, `(${x})`);
                let y = eval(parsedExpr);

                // Convert math Y value back to canvas pixel position
                let pixelY = centerY - (y * scale);

                if (first) {
                    ctx.moveTo(pixelX, pixelY);
                    first = false;
                } else {
                    ctx.lineTo(pixelX, pixelY);
                }
            } catch (e) {
                // Skip errors while drawing complex points
            }
        }
        ctx.stroke();
    }

    // Initialize the canvas layout
    window.onload = () => {
        resizeCanvas();
    };
</script>

</body>
</html>
