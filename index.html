
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mode Graphing Calculator - Nike Edition</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #0a0a0a;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .calculator-container {
            background-color: #141414;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 10px 40px rgba(0, 0, 0, 0.7);
            border: 1px solid #2d2d2d;
            width: 100%;
            max-width: 450px;
        }

        /* The Graphing Grid Area */
        #graphCanvas {
            background-color: #000000;
            border: 1px solid #333;
            border-radius: 10px;
            display: block;
            width: 100%;
            height: 250px;
            margin-bottom: 15px;
        }

        /* Display Wrapper to hold the input and the logo overlay */
        .display-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 15px;
        }

        #display {
            width: 100%;
            height: 65px;
            background-color: #111;
            border: 1px solid #444;
            color: #ffffff; 
            text-align: right;
            font-size: 26px;
            padding: 5px 15px;
            box-sizing: border-box;
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            position: relative;
            z-index: 2;
        }

        /* The Nike Logo Watermark overlay */
        .nike-logo-overlay {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1;
            pointer-events: none; /* Allows clicking right through it */
            transition: opacity 0.2s ease;
        }

        .nike-logo-overlay svg {
            fill: rgba(255, 255, 255, 0.25); /* Sleek, semi-transparent white */
            width: 70px;
            height: auto;
        }

        /* Class to hide the logo instantly when typing */
        .hidden {
            opacity: 0 !important;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #262626;
            color: white;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: #3a3a3a;
        }

        button:active {
            transform: scale(0.95);
        }

        /* Graph & Special Buttons */
        button.graph-btn {
            background-color: #333;
            border: 1px solid #555;
        }
        button.graph-btn:hover {
            background-color: #444;
        }

        button.operator {
            background-color: #ffffff;
            color: black;
        }
        button.operator:hover {
            background-color: #dddddd;
        }

        button.clear {
            background-color: #b32424;
        }
        button.clear:hover {
            background-color: #d93636;
        }
    </style>
</head>
<body>

<div class="calculator-container">
    <canvas id="graphCanvas"></canvas>
    
    <div class="display-wrapper">
        <div class="nike-logo-overlay" id="nikeLogo">
            <svg viewBox="0 0 24 24">
                <path d="M21,6.5c-0.3,0.3-4.1,3.4-8.8,5.9C7.4,14.9,3.1,16,1.9,15.6c-0.2,0-0.3-0.2-0.1-0.4c0.5-0.6,3.6-4.1,8.9-7.3 c4.4-2.7,8.8-4,10.1-3.6C21.1,4.5,21.3,6.2,21,6.5z"/>
            </svg>
        </div>
        <input type="text" id="display" placeholder="" oninput="checkLogo()" autofocus>
    </div>
    
    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="graph-btn" onclick="appendValue('x')">x</button>
        <button class="graph-btn" onclick="plotGraph()">PLOT</button>
        <button class="operator" onclick="appendValue('/')">/</button>
        
        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('*')">*</button>
        
        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button class="operator" onclick="appendValue('-')">-</button>
        
        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button class="operator" onclick="appendValue('+')">+</button>
        
        <button onclick="appendValue('0')" style="grid-column: span 2;">0</button>
        <button onclick="appendValue('.')">.</button>
        <button class="operator" onclick="calculate()">=</button>
    </div>
</div>

<script>
    const display = document.getElementById('display');
    const nikeLogo = document.getElementById('nikeLogo');
    const canvas = document.getElementById('graphCanvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
        canvas.width = canvas.clientWidth;
        canvas.height = canvas.clientHeight;
        drawGrid();
    }

    function drawGrid() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const scale = 20; 
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;

        ctx.strokeStyle = '#1a1a1a'; 
        ctx.lineWidth = 1;

        for (let x = centerX; x < canvas.width; x += scale) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }
        for (let x = centerX; x > 0; x -= scale) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }
        for (let y = centerY; y < canvas.height; y += scale) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }
        for (let y = centerY; y > 0; y -= scale) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }

        ctx.strokeStyle = '#444'; 
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(0, centerY); ctx.lineTo(canvas.width, centerY); 
        ctx.moveTo(centerX, 0); ctx.lineTo(centerX, canvas.height); 
        ctx.stroke();
    }

    // Function to handle the logo visibility rules
    function checkLogo() {
        if (display.value.length > 0) {
            nikeLogo.classList.add('hidden'); // Disappear when values exist
        } else {
            nikeLogo.classList.remove('hidden'); // Reappear if cleared out completely
        }
    }

    function appendValue(val) {
        display.value += val;
        checkLogo();
    }

    function clearDisplay() {
        display.value = '';
        checkLogo();
        drawGrid();
    }

    function calculate() {
        try {
            if (!display.value.includes('x')) {
                display.value = eval(display.value);
            } else {
                plotGraph();
            }
            checkLogo();
        } catch (error) {
            display.value = 'Error';
        }
    }

    function plotGraph() {
        drawGrid();
        const expr = display.value;
        if (!expr) return;

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const scale = 20; 

        ctx.strokeStyle = '#ffffff'; // Clean white line for the graph plots
        ctx.lineWidth = 2.5;
        ctx.beginPath();

        let first = true;

        for (let pixelX = 0; pixelX < canvas.width; pixelX++) {
            let x = (pixelX - centerX) / scale;
            try {
                let parsedExpr = expr.replace(/(\d)(x)/g, '$1*$2').replace(/x/g, `(${x})`);
                let y = eval(parsedExpr);
                let pixelY = centerY - (y * scale);

                if (first) {
                    ctx.moveTo(pixelX, pixelY);
                    first = false;
                } else {
                    ctx.lineTo(pixelX, pixelY);
                }
            } catch (e) {}
        }
        ctx.stroke();
    }

    window.onload = () => {
        resizeCanvas();
    };
</script>

</body>
</html>
