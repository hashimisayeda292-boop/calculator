<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desmos Dark Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #000000;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            overflow: hidden;
        }

        /* Splash Screen */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        .splash-logo {
            width: 150px;
            height: auto;
            fill: #ffffff;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }

        .fade-out {
            opacity: 0;
            visibility: hidden;
        }

        /* Main Workspace Split Layout Like Desmos */
        .workspace {
            display: flex;
            flex: 1;
            height: 100%;
            width: 100%;
        }

        /* Left Side Bar for Inputs */
        .sidebar {
            width: 350px;
            background-color: #111111;
            border-right: 1px solid #2d2d2d;
            display: flex;
            flex-direction: column;
            padding: 15px;
            box-sizing: border-box;
            z-index: 10;
        }

        .sidebar-title {
            font-size: 14px;
            font-weight: bold;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .input-row {
            display: flex;
            align-items: center;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
        }

        .expression-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #388bfd; /* Desmos blue line indicator */
            margin-right: 12px;
        }

        #equation-input {
            flex: 1;
            background: none;
            border: none;
            color: #ffffff;
            font-size: 18px;
            font-family: 'Courier New', Courier, monospace;
            outline: none;
        }

        #equation-input::placeholder {
            color: #555;
        }

        /* Right Side Graph Area */
        .graph-area {
            flex: 1;
            position: relative;
            background-color: #050505;
        }

        #graphCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Coordinates guide tooltip */
        .info-overlay {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background-color: rgba(20, 20, 20, 0.8);
            border: 1px solid #333;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            color: #aaa;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="splash-screen">
    <svg class="splash-logo" viewBox="0 0 24 24">
        <path d="M21,6.5c-0.3,0.3-4.1,3.4-8.8,5.9C7.4,14.9,3.1,16,1.9,15.6c-0.2,0-0.3-0.2-0.1-0.4c0.5-0.6,3.6-4.1,8.9-7.3 c4.4-2.7,8.8-4,10.1-3.6C21.1,4.5,21.3,6.2,21,6.5z"/>
    </svg>
</div>

<div class="workspace">
    
    <div class="sidebar">
        <div class="sidebar-title">Expressions</div>
        
        <div class="input-row">
            <div class="expression-color"></div>
            <input type="text" id="equation-input" placeholder="e.g., x^2 or 2*x + 3" autocomplete="off" autofocus>
        </div>
        
        <p style="font-size: 12px; color: #555; line-height: 1.5;">
            Type any mathematical expression using <b>x</b>. The graph will update instantly as you type! No button clicking required.
        </p>
    </div>

    <div class="graph-area">
        <canvas id="graphCanvas"></canvas>
        <div class="info-overlay">Grid Scale: Auto Zoom</div>
    </div>

</div>

<script>
    const canvas = document.getElementById('graphCanvas');
    const ctx = canvas.getContext('2d');
    const input = document.getElementById('equation-input');
    const splashScreen = document.getElementById('splash-screen');

    // Grid System settings
    const scale = 40; // Pixels per grid unit

    window.onload = () => {
        resizeCanvas();
        
        // Listen directly to user typing for live updates
        input.addEventListener('input', drawAll);

        setTimeout(() => {
            splashScreen.classList.add('fade-out');
            resizeCanvas();
        }, 3000);
    };

    function resizeCanvas() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
        drawAll();
    }

    function drawAll() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawDesmosGrid();
        plotEquation();
    }

    // Precise mathematical Desmos grid alignment
    function drawDesmosGrid() {
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;

        // Subtle dark grid lines
        ctx.strokeStyle = '#161616';
        ctx.lineWidth = 1;

        // Draw vertical grid lines
        for (let x = centerX; x < canvas.width; x += scale) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }
        for (let x = centerX; x > 0; x -= scale) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }

        // Draw horizontal grid lines
        for (let y = centerY; y < canvas.height; y += scale) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }
        for (let y = centerY; y > 0; y -= scale) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }

        // Main primary central X and Y intersection axes
        ctx.strokeStyle = '#444444';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, centerY); ctx.lineTo(canvas.width, centerY); // X Axis
        ctx.moveTo(centerX, 0); ctx.lineTo(centerX, canvas.height); // Y Axis
        ctx.stroke();
    }

    // Clean structural equation execution
    function plotEquation() {
        const value = input.value.trim();
        if (!value) return;

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;

        ctx.strokeStyle = '#388bfd'; // Official Desmos active glowing blue line
        ctx.lineWidth = 3;
        ctx.beginPath();

        let first = true;

        // Sweep horizontally across every screen pixel to build the perfect curve
        for (let pixelX = 0; pixelX < canvas.width; pixelX++) {
            // Translate screen pixel position into a graph coordinate 'x'
            let x = (pixelX - centerX) / scale;

            try {
                // Use Math.js package engine to compute complex formulas natively
                let y = math.evaluate(value, { x: x });

                if (typeof y === 'number' && !isNaN(y) && isFinite(y)) {
                    // Translate math plot coordinate 'y' back into screen view pixels
                    let pixelY = centerY - (y * scale);

                    if (first) {
                        ctx.moveTo(pixelX, pixelY);
                        first = false;
                    } else {
                        ctx.lineTo(pixelX, pixelY);
                    }
                }
            } catch (err) {
                // Ignore parse errors dynamically while user is still typing mid-sentence
            }
        }
        ctx.stroke();
    }

    window.addEventListener('resize', resizeCanvas);
</script>

</body>
</html>
