<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Resell Profit Calculator</title>
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .calc-card {
            background-color: #111111;
            border: 1px solid #222222;
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        h2 {
            margin-top: 0;
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            letter-spacing: -0.5px;
            color: #ffffff;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #888888;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .currency-symbol {
            position: absolute;
            left: 15px;
            color: #555555;
            font-weight: 600;
        }

        input, select {
            width: 100%;
            background-color: #1a1a1a;
            border: 1px solid #333333;
            border-radius: 8px;
            padding: 14px 14px 14px 30px;
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        select {
            padding-left: 15px;
            cursor: pointer;
            appearance: none;
        }

        input:focus, select:focus {
            border-color: #ffffff;
        }

        .result-box {
            background-color: #161616;
            border: 1px dashed #333333;
            border-radius: 12px;
            padding: 20px;
            margin-top: 25px;
            text-align: center;
        }

        .result-label {
            font-size: 12px;
            color: #888888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .result-amount {
            font-size: 36px;
            font-weight: 800;
            color: #00ff66; /* Neon profit green */
            letter-spacing: -1px;
        }

        .fee-breakdown {
            font-size: 13px;
            color: #555555;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="calc-card">
    <h2>RESELL PROFIT CALC</h2>
    
    <div class="input-group">
        <label>Selling Platform</label>
        <div class="input-wrapper">
            <select id="platform" onchange="calculateProfit()">
                <option value="0.1325">eBay (Standard ~13.25%)</option>
                <option value="0.10">StockX (~10%)</option>
                <option value="0.05">Goat (~5%)</option>
                <option value="0.00">Local Cash / Meetup (0%)</option>
            </select>
        </div>
    </div>

    <div class="input-group">
        <label>Sold Price</label>
        <div class="input-wrapper">
            <span class="currency-symbol">$</span>
            <input type="number" id="soldPrice" placeholder="0.00" oninput="calculateProfit()">
        </div>
    </div>

    <div class="input-group">
        <label>Item Cost (What you paid)</label>
        <div class="input-wrapper">
            <span class="currency-symbol">$</span>
            <input type="number" id="itemCost" placeholder="0.00" oninput="calculateProfit()">
        </div>
    </div>

    <div class="input-group">
        <label>Shipping Cost / Fees</label>
        <div class="input-wrapper">
            <span class="currency-symbol">$</span>
            <input type="number" id="shipping" placeholder="0.00" oninput="calculateProfit()">
        </div>
    </div>

    <div class="result-box">
        <div class="result-label">Net Net Profit</div>
        <div class="result-amount" id="profitDisplay">$0.00</div>
        <div class="fee-breakdown" id="feeDisplay">Platform Fees: $0.00</div>
    </div>
</div>

<script>
    function calculateProfit() {
        const platformRate = parseFloat(document.getElementById('platform').value);
        const soldPrice = parseFloat(document.getElementById('soldPrice').value) || 0;
        const itemCost = parseFloat(document.getElementById('itemCost').value) || 0;
        const shipping = parseFloat(document.getElementById('shipping').value) || 0;

        // Calculate the marketplace slice
        let fees = soldPrice * platformRate;
        if (platformRate > 0 && platformRate !== 0.1325) {
            fees += 5; // Standard flat transaction fees for sneaker apps
        } else if (platformRate === 0.1325) {
            fees += 0.30; // eBay flat per-order fee
        }

        // Net math formula
        const totalProfit = soldPrice - itemCost - shipping - fees;

        // Update numbers on screen
        const profitDisplay = document.getElementById('profitDisplay');
        const feeDisplay = document.getElementById('feeDisplay');

        feeDisplay.innerText = "Platform Fees: $" + fees.toFixed(2);
        profitDisplay.innerText = "$" + totalProfit.toFixed(2);

        // Turn red if losing money, green if in the green!
        if (totalProfit < 0) {
            profitDisplay.style.color = "#ff3333";
        } else {
            profitDisplay.style.color = "#00ff66";
        }
    }
</script>

</body>
</html>
