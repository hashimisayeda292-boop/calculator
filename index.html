<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brazil Football Edition Calculator</title>
    <style>
        body {
            background-color: #006c35; /* Brasil Deep Green */
            color: #ffffff;
            font-family: 'Arial Black', Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* LEFT BRANDING: Nike Swoosh Silhouette via SVG */
        .brand-left {
            position: absolute;
            left: 40px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.15;
            width: 180px;
            pointer-events: none;
        }

        /* RIGHT BRANDING: Adidas 3-Stripes Silhouette via SVG */
        .brand-right {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%) rotate(-15deg);
            opacity: 0.15;
            width: 150px;
            pointer-events: none;
        }

        /* Central Calculator Housing */
        .calc-container {
            background-color: #004b23; /* Darker stadium green border padding */
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border: 4px solid #ffdf00; /* Brasil Canary Yellow Border */
            width: 340px;
            z-index: 10;
        }

        .header-title {
            text-align: center;
            color: #ffdf00;
            font-size: 20px;
            letter-spacing: 1px;
            margin-bottom: 20px;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }

        /* Modern Digital Display Screen */
        .screen {
            background-color: #0b0c10;
            border: 2px solid #006c35;
            border-radius: 12px;
            width: 100%;
            height: 75px;
            padding: 15px;
            box-sizing: border-box;
            color: #ffdf00;
            font-size: 32px;
            text-align: right;
            margin-bottom: 25px;
            outline: none;
            font-family: monospace;
        }

        /* Keypad Grid Alignment */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        /* Grid Key Buttons */
        .btn {
            background-color: #006c35;
            border: 2px solid #004b23;
            border-radius: 14px;
            color: #ffffff;
            font-size: 22px;
            font-weight: bold;
            padding: 18px 0;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 4px 0px #003619;
        }

        .btn:hover {
            background-color: #ffdf00;
            color: #004b23;
            border-color: #ffdf00;
            box-shadow: 0 4px 0px #cca300;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* Specific Special Utility Keys Styling */
        .btn.clear {
            background-color: #9e2a2b;
            box-shadow: 0 4px 0px #6e1d1e;
            border-color: #6e1d1e;
        }
        .btn.clear:hover {
            background-color: #ff4d4d;
            color: #ffffff;
            border-color: #ff4d4d;
        }

        .btn.operator {
            color: #ffdf00;
        }

        .btn.equals {
            background-color: #ffdf00;
            color: #004b23;
            box-shadow: 0 4px 0px #cca300;
            border-color: #ffdf00;
        }
        .btn.equals:hover {
            background-color: #ffffff;
            color: #006c35;
            border-color: #ffffff;
            box-shadow: 0 4px 0px #b3b3b3;
        }
    </style>
</head>
<body>

    <svg class="brand-left" viewBox="0 0 24 24" fill="#ffffff">
        <path d="M21,6.5C17.5,7.5 13,9.5 9,13.5C6.5,16 5.2,18.5 5,20C4.9,20.2 4.6,20.1 4.5,19.8C3.8,17.5 4.5,13.5 7.5,9.5C11,5 16.5,3.2 21.5,3.0C21.8,3.0 21.9,3.3 21.7,3.5C21.5,4.5 21.3,5.5 21,6.5Z"/>
    </svg>

    <svg class="brand-right" viewBox="0 0 24 24" fill="#ffffff">
        <rect x="4" y="14" width="3" height="8" rx="0.5"/>
        <rect x="10" y="8" width="3" height="14" rx="0.5"/>
        <rect x="16" y="2" width="3" height="20" rx="0.5"/>
    </svg>

    <div class="calc-container">
        <div class="header-title">Brasil Edition</div>
        <input type="text" class="screen" id="display" readonly value="0">
        
        <div class="grid">
            <button class="btn clear" onclick="clearScreen()">C</button>
            <button class="btn operator" onclick="appendValue('/')">÷</button>
            <button class="btn operator" onclick="appendValue('*')">×</button>
            <button class="btn operator" onclick="appendValue('-')">−</button>
            
            <button class="btn" onclick="appendValue('7')">7</button>
            <button class="btn" onclick="appendValue('8')">8</button>
            <button class="btn" onclick="appendValue('9')">9</button>
            <button class="btn operator" onclick="appendValue('+')">+</button>
            
            <button class="btn" onclick="appendValue('4')">4</button>
            <button class="btn" onclick="appendValue('5')">5</button>
            <button class="btn" onclick="appendValue('6')">6</button>
            <button class="btn equals" onclick="calculate()" style="grid-row: span 2; height: 100%;">=</button>
            
            <button class="btn" onclick="appendValue('1')">1</button>
            <button class="btn" onclick="appendValue('2')">2</button>
            <button class="btn" onclick="appendValue('3')">3</button>
            
            <button class="btn" onclick="appendValue('0')" style="grid-column: span 2;">0</button>
            <button class="btn" onclick="appendValue('.')">.</button>
        </div>
    </div>

<script>
    const display = document.getElementById('display');
    let currentInput = '';

    function appendValue(val) {
        if (display.value === '0' && !isNaN(val)) {
            currentInput = val;
        } else {
            currentInput += val;
        }
        display.value = currentInput;
    }

    function clearScreen() {
        currentInput = '';
        display.value = '0';
    }

    function calculate() {
        try {
            // Evaluates mathematical operations securely 
            if (currentInput === '') return;
            const result = eval(currentInput);
            display.value = Number(result.toFixed(4)); // Keeps decimals clean if they happen
            currentInput = display.value;
        } catch (error) {
            display.value = 'Error';
            currentInput = '';
        }
    }
</script>

</body>
</html>
