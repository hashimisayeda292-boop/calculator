<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brazil National Team Edition Calculator</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #009c3b 40%, #ffdf00 100%);
            font-family: 'Arial Black', Arial, sans-serif;
            margin: 0;
            position: relative;
            overflow: hidden;
        }

        /* Brand Accents on the sides */
        .brand-left, .brand-right {
            position: absolute;
            color: rgba(255, 255, 255, 0.15);
            font-size: 5rem;
            font-style: italic;
            font-weight: 900;
            user-select: none;
            letter-spacing: 5px;
        }
        .brand-left {
            left: 5%;
            transform: rotate(-90deg);
        }
        .brand-right {
            right: 5%;
            transform: rotate(90deg);
        }

        .calculator {
            background-color: #002244; /* Deep Brazilian Blue */
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.5);
            border: 4px solid #ffdf00; /* Yellow Border */
            width: 320px;
            z-index: 10;
        }

        .calc-header {
            text-align: center;
            color: #ffdf00;
            font-size: 16px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #display {
            width: 100%;
            height: 60px;
            background-color: #111;
            border: 2px solid #009c3b;
            color: #fff;
            text-align: right;
            font-size: 28px;
            padding: 5px 15px;
            box-sizing: border-box;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            padding: 18px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            background-color: #009c3b; /* Brazilian Green */
            color: white;
            transition: transform 0.1s, background-color 0.2s;
        }

        button:hover {
            background-color: #007a2e;
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        /* Yellow Operator Buttons */
        button.operator {
            background-color: #ffdf00;
            color: #002244;
        }
        button.operator:hover {
            background-color: #e5c700;
        }

        /* Clear Button */
        button.clear {
            background-color: #cc0000;
        }
        button.clear:hover {
            background-color: #a30000;
        }
    </style>
</head>
<body>

<!-- Brand Style Text Accents -->
<div class="brand-left">NIKE</div>
<div class="brand-right">ADIDAS</div>

<div class="calculator">
    <div class="calc-header">Brasil Edition</div>
    <input type="text" id="display" readonly>
    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="appendValue('/')">/</button>
        <button class="operator" onclick="appendValue('*')">*</button>
        <button class="operator" onclick="appendValue('-')">-</button>
        
        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('+')">+</button>
        
        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button class="operator" style="grid-row: span 2; height: 100%;" onclick="calculate()">=</button>
        
        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        
        <button onclick="appendValue('0')" style="grid-column: span 2;">0</button>
        <button onclick="appendValue('.')">.</button>
    </div>
</div>

<script>
    const display = document.getElementById('display');

    function appendValue(val) {
        display.value += val;
    }

    function clearDisplay() {
        display.value = '';
    }

    function calculate() {
        try {
            display.value = eval(display.value);
        } catch (error) {
            display.value = 'Error';
        }
    }
</script>

</body>
</html>
